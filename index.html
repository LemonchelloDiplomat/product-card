<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="cards-container">
        
        <div class="card">
            <img src="images/Capuccino.jpg" alt="Капучино">
            <h2>Капучино</h2>
            <p>Классический кофе с нежной молочной пенкой</p>
            <div class="card-footer">
                <div class="price">250 ₽</div>
                <button>Заказать</button>
            </div>
        </div>

        <div class="card">
            <img src="images/Latte.jpg" alt="Латте">
            <h2>Латте</h2>
            <p>Кофе с большим количеством горячего молока</p>
            <div class="card-footer">
                <div class="price">280 ₽</div>
                <button>Заказать</button>
            </div>
        </div>
        
        <div class="card">
            <img src="images/Espresso.jpg" alt="Эспрессо">
            <h2>Эспрессо</h2>
            <p>Крепкий чёрный кофе маленького объёма</p>
            <div class="card-footer">
                <div class="price">150 ₽</div>
                <button>Заказать</button>
            </div>
        </div>
        
    </div>
</body>
</html>
